<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Stopwatch body -->
  <circle cx="256" cy="280" r="140" stroke="#FEF3C7" stroke-width="28" fill="none"/>

  <!-- Stopwatch top button -->
  <rect x="240" y="108" width="32" height="40" rx="8" fill="#FEF3C7"/>

  <!-- Stopwatch side button -->
  <rect x="350" y="175" width="36" height="20" rx="6" fill="#FEF3C7" transform="rotate(35, 368, 185)"/>

  <!-- Hour hand (slow, representing human) -->
  <line x1="256" y1="280" x2="210" y2="220" stroke="#FEF3C7" stroke-width="12" stroke-linecap="round" opacity="0.4"/>

  <!-- Minute hand (fast, representing AI — pointing near 12 o'clock) -->
  <line x1="256" y1="280" x2="264" y2="170" stroke="#FEF3C7" stroke-width="12" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="280" r="12" fill="#FEF3C7"/>

  <!-- Lightning bolt (speed) -->
  <polygon points="340,310 310,290 330,270 300,260 350,220 330,260 355,270" fill="#FEF3C7" opacity="0.9"/>
</svg>
